<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Caterpillar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d29;
    --grid-a: #12151f;
    --grid-b: #151926;
    --snake: #facc15;
    --snake-head: #fde047;
    --food: #4ade80;
    --accent: #60a5fa;
    --text: #e5e7eb;
    --muted: #8b91a1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(1200px 600px at 50% -10%, #1b2030, var(--bg));
    font-family: "Poppins", system-ui, sans-serif;
    color: var(--text);
    padding: 20px;
  }

  .game {
    width: 100%;
    max-width: 440px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  h1 {
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  h1 span { color: var(--snake); }

  .scores { display: flex; gap: 20px; }
  .scores .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .scores .value {
    font-family: "JetBrains Mono", monospace;
    font-size: 1.4rem;
    font-weight: 600;
    line-height: 1.1;
  }
  .scores .best .value { color: var(--accent); }

  .board-wrap {
    position: relative;
    border-radius: 18px;
    padding: 12px;
    background: var(--panel);
    box-shadow: 0 20px 50px -20px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  canvas {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 10px;
    background: var(--grid-a);
  }

  .overlay {
    position: absolute;
    inset: 12px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
    background: rgba(15,17,23,0.82);
    backdrop-filter: blur(4px);
    transition: opacity 0.25s ease;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay h2 { font-size: 1.5rem; font-weight: 700; }
  .overlay p { color: var(--muted); font-size: 0.9rem; max-width: 260px; }

  button {
    margin-top: 6px;
    font-family: inherit;
    font-weight: 600;
    font-size: 0.95rem;
    color: #0f1117;
    background: var(--snake);
    border: none;
    padding: 12px 28px;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 8px 20px -6px rgba(250,204,21,0.6);
  }
  button:hover { transform: translateY(-2px); }
  button:active { transform: translateY(0); }

  .hint {
    margin-top: 16px;
    text-align: center;
    color: var(--muted);
    font-size: 0.82rem;
    line-height: 1.6;
  }
  kbd {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.72rem;
    background: #262a38;
    border: 1px solid #333849;
    border-radius: 5px;
    padding: 1px 6px;
  }

  @media (prefers-reduced-motion: reduce) {
    button, .overlay { transition: none; }
  }
</style>
</head>
<body>
  <div class="game">
    <header>
      <h1>Caterpillar<span>.</span></h1>
      <div class="scores">
        <div>
          <div class="label">Score</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="best">
          <div class="label">Best</div>
          <div class="value" id="best">0</div>
        </div>
      </div>
    </header>

    <div class="board-wrap">
      <canvas id="board" width="400" height="400"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="ov-title">Ready?</h2>
        <p id="ov-text">Use the arrow keys or WASD to steer your caterpillar. Eat the green dots and don't bite yourself.</p>
        <button id="start-btn">Play</button>
      </div>
    </div>

    <p class="hint">
      <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> to move · <kbd>Space</kbd> to pause<br />
      On mobile, swipe on the board.
    </p>
  </div>

<script>
(() => {
  const canvas = document.getElementById("board");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const overlay = document.getElementById("overlay");
  const ovTitle = document.getElementById("ov-title");
  const ovText = document.getElementById("ov-text");
  const startBtn = document.getElementById("start-btn");

  const GRID = 20;              // cells per row/column
  const CELL = canvas.width / GRID;
  const SPEED = 8;              // moves per second

  // In-memory state (no persistence in the sandbox)
  let best = 0;

  let snake, dir, nextDir, food, score, running, paused;
  let lastMove = 0, rafId = null;

  function reset() {
    snake = [{ x: 9, y: 10 }, { x: 8, y: 10 }, { x: 7, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    placeFood();
    scoreEl.textContent = "0";
  }

  function placeFood() {
    // find a cell not occupied by the snake
    let cell;
    do {
      cell = { x: (Math.random() * GRID) | 0, y: (Math.random() * GRID) | 0 };
    } while (snake.some(s => s.x === cell.x && s.y === cell.y));
    food = cell;
  }

  function startGame() {
    reset();
    running = true;
    paused = false;
    overlay.classList.add("hidden");
    lastMove = 0;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function gameOver() {
    running = false;
    best = Math.max(best, score);
    bestEl.textContent = best;
    ovTitle.textContent = "Game Over";
    ovText.textContent = `You scored ${score}. ${score >= best && score > 0 ? "New best!" : "Give it another go."}`;
    startBtn.textContent = "Play again";
    overlay.classList.remove("hidden");
  }

  function loop(ts) {
    rafId = requestAnimationFrame(loop);
    if (!running || paused) return;
    if (ts - lastMove < 1000 / SPEED) return;
    lastMove = ts;
    step();
    draw();
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall or self collision
    if (
      head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID ||
      snake.some(s => s.x === head.x && s.y === head.y)
    ) {
      gameOver();
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      placeFood();
    } else {
      snake.pop();
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
    ctx.fill();
  }

  function draw() {
    // checkerboard background
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        ctx.fillStyle = (x + y) % 2 === 0 ? "#12151f" : "#151926";
        ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
      }
    }

    // food
    const fx = food.x * CELL, fy = food.y * CELL;
    ctx.fillStyle = "#4ade80";
    ctx.shadowColor = "#4ade80";
    ctx.shadowBlur = 12;
    roundRect(fx + CELL * 0.2, fy + CELL * 0.2, CELL * 0.6, CELL * 0.6, 5);
    ctx.shadowBlur = 0;

    // caterpillar
    const last = snake.length - 1;
    snake.forEach((s, i) => {
      if (i === last && snake.length > 1) {
        drawTail(s, snake[i - 1]);
      } else {
        ctx.fillStyle = i === 0 ? "#fde047" : "#facc15";
        const pad = i === 0 ? 1.5 : 2.5;
        roundRect(s.x * CELL + pad, s.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, 6);
      }
    });
  }

  // Triangle tail pointing away from the body
  function drawTail(tail, prev) {
    const cx = tail.x * CELL + CELL / 2;
    const cy = tail.y * CELL + CELL / 2;
    // outward direction = away from the segment before the tail
    const ox = tail.x - prev.x;
    const oy = tail.y - prev.y;
    const h = CELL / 2 - 1;   // half-size
    ctx.fillStyle = "#facc15";
    ctx.beginPath();
    // tip pokes outward, base spans the cell perpendicular to travel
    ctx.moveTo(cx + ox * h, cy + oy * h);
    ctx.lineTo(cx - ox * h + oy * h, cy - oy * h + ox * h);
    ctx.lineTo(cx - ox * h - oy * h, cy - oy * h - ox * h);
    ctx.closePath();
    ctx.fill();
  }

  // ---- Controls ----
  const DIRS = {
    ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 },
    w: { x: 0, y: -1 }, s: { x: 0, y: 1 }, a: { x: -1, y: 0 }, d: { x: 1, y: 0 },
  };

  function setDir(nd) {
    // prevent 180° reversals
    if (nd.x === -dir.x && nd.y === -dir.y) return;
    nextDir = nd;
  }

  window.addEventListener("keydown", (e) => {
    const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    if (DIRS[key]) {
      e.preventDefault();
      if (running) setDir(DIRS[key]);
    } else if (e.key === " ") {
      e.preventDefault();
      if (running) {
        paused = !paused;
        if (paused) {
          ovTitle.textContent = "Paused";
          ovText.textContent = "Press Space or Play to resume.";
          startBtn.textContent = "Resume";
          overlay.classList.remove("hidden");
        } else {
          overlay.classList.add("hidden");
        }
      }
    }
  });

  startBtn.addEventListener("click", () => {
    if (paused && running) {
      paused = false;
      overlay.classList.add("hidden");
    } else {
      startGame();
    }
  });

  // touch / swipe
  let touchStart = null;
  canvas.addEventListener("touchstart", (e) => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  canvas.addEventListener("touchmove", (e) => {
    if (!touchStart || !running) return;
    const dx = e.touches[0].clientX - touchStart.x;
    const dy = e.touches[0].clientY - touchStart.y;
    if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir({ x: dx > 0 ? 1 : -1, y: 0 });
    else setDir({ x: 0, y: dy > 0 ? 1 : -1 });
    touchStart = null;
    e.preventDefault();
  }, { passive: false });

  // initial paint
  reset();
  draw();
})();
</script>
</body>
</html>
